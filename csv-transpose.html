<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV/TSV 転置ツール</title>
  <style>
    #csvOutput {
      white-space: pre;
      overflow-x: auto;
      overflow-y: auto;
      font-family: monospace;
    }
    #csvInput {
      white-space: pre;
      overflow-x: auto;
      overflow-y: auto;
      font-family: monospace;
      border: 2px solid #ccc;
      padding: 5px;
    }
    #csvInput.dragover {
      background-color: #eef;
      border-color: #44f;
    }
  </style>
</head>
<body>
  <h2>入力: CSV/TSV を貼り付け（ドラッグ＆ドロップ可）またはファイル選択</h2>
  <textarea id="csvInput" rows="10" cols="80"
    placeholder="ここにCSV/TSVを貼り付け、またはファイルをドラッグ＆ドロップ"></textarea>
  <div>
    <input type="file" id="fileInput" accept=".csv,.tsv">
  </div>

  <h2>転置結果</h2>
  <p>
    <button id="transposeBtn">転置する</button>
  </p>

  <textarea id="csvOutput" rows="10" cols="80" readonly
    placeholder="転置実行ボタンを押すと結果がここに表示されます"
  ></textarea>
  <div>
    <div>
      クリップボードの形式:
      <label>
        <input type="radio" name="format" value="tsv" checked>
        TSV（Excel向け・デフォルト）
      </label>
      <label>
        <input type="radio" name="format" value="csv">
        CSV
      </label>
    </div>
    <button id="downloadBtn">CSVとしてダウンロード（常にBOM付き）</button>
    <button id="copyBtn">クリップボードにコピー（選択形式）</button>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const csvInput = document.getElementById('csvInput');
    const csvOutput = document.getElementById('csvOutput');
    const transposeBtn = document.getElementById('transposeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');

    // ファイル読み込み（BOM対応）
    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        let text = e.target.result;

        // BOM除去
        if (text.charCodeAt(0) === 0xFEFF) {
          text = text.slice(1);
        }

        csvInput.value = text;
      };
      reader.readAsText(file, 'utf-8');
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) loadFile(file);
    });

    // textarea にドラッグ＆ドロップ対応
    csvInput.addEventListener('dragover', (e) => {
      e.preventDefault();
      csvInput.classList.add('dragover');
    });

    csvInput.addEventListener('dragleave', () => {
      csvInput.classList.remove('dragover');
    });

    csvInput.addEventListener('drop', (e) => {
      e.preventDefault();
      csvInput.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    // 出力形式の区切り文字
    function getSelectedDelimiter() {
      const format = document.querySelector('input[name="format"]:checked').value;
      return format === 'tsv' ? '\t' : ',';
    }

    // 入力の区切り文字を自動判定（TSV優先）
    function detectDelimiter(text) {
      if (text.includes('\t')) return '\t';
      return ',';
    }

    // 転置処理
    function transposeCsv(text, delimiter) {
      const rows = text.split(/\r?\n/).map(line => line.split(delimiter));
      const maxCols = Math.max(...rows.map(r => r.length));

      const normalized = rows.map(r => {
        const copy = r.slice();
        while (copy.length < maxCols) copy.push('');
        return copy;
      });

      const transposed = [];
      for (let c = 0; c < maxCols; c++) {
        const newRow = [];
        for (let r = 0; r < normalized.length; r++) {
          newRow.push(normalized[r][c]);
        }
        transposed.push(newRow);
      }

      return transposed;
    }

    // 区切り文字変換
    function convertDelimiter(rows, toDelim) {
      return rows.map(row => row.join(toDelim)).join('\r\n');
    }

    // 転置ボタン
    transposeBtn.addEventListener('click', () => {
      const inputText = csvInput.value.trim();
      if (!inputText) {
        alert('CSV/TSVを入力してください');
        return;
      }

      // ダブルクォート検出（未サポート）
      if (inputText.includes('"')) {
        alert('ダブルクォートを含むCSVは未サポートです');
        return;
      }

      const delimiter = detectDelimiter(inputText);
      const transposed = transposeCsv(inputText, delimiter);

      const outputDelimiter = getSelectedDelimiter();
      const converted = convertDelimiter(transposed, outputDelimiter);

      csvOutput.value = converted;
    });

    // ダウンロード（常に BOM 付き CSV）
    downloadBtn.addEventListener('click', () => {
      const text = csvOutput.value;
      if (!text) {
        alert('転置結果がありません');
        return;
      }

      const currentDelim = getSelectedDelimiter();
      const rows = text.split(/\r?\n/).map(line => line.split(currentDelim));
      const csvText = convertDelimiter(rows, ',');

      const bom = "\uFEFF";  // UTF-8 BOM
      const blob = new Blob([bom + csvText], { type: 'text/csv;charset=utf-8;' });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'transposed.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // クリップボードコピー
    copyBtn.addEventListener('click', async () => {
      const text = csvOutput.value;
      if (!text) {
        alert('転置結果がありません');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert('クリップボードにコピーしました');
      } catch (e) {
        alert('コピーに失敗しました');
      }
    });
  </script>
</body>
</html>
