<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV/TSV 転置ツール</title>
  <style>
    textarea {
      white-space: pre;        /* 改行は尊重、折り返しなし */
      overflow-x: auto;        /* 横スクロールバー */
      overflow-y: auto;        /* 縦スクロールバー */
      font-family: monospace;  /* 表構造が見やすくなる */
    }
  </style>
</head>
<body>
  <h1>CSV/TSV 転置ツール（クライアントサイドのみ）</h1>

  <h2>1. CSVファイルを選択（BOM付き対応）</h2>
  <input type="file" id="fileInput" accept=".csv,.tsv">

  <h2>2. または、CSV/TSV を貼り付け</h2>
  <textarea id="csvInput" rows="10" cols="80" placeholder="ここにCSV/TSVを貼り付け"></textarea>

  <h2>3. 出力形式（テキストエリア／クリップボード）</h2>
  <label>
    <input type="radio" name="format" value="tsv" checked>
    TSV（Excel向け・デフォルト）
  </label>
  <label>
    <input type="radio" name="format" value="csv">
    CSV
  </label>

  <div>
    <button id="transposeBtn">転置する</button>
  </div>

  <h2>転置結果</h2>
  <textarea id="csvOutput" rows="10" cols="80" readonly></textarea>

  <div>
    <button id="downloadBtn">CSVとしてダウンロード（常にCSV）</button>
    <button id="copyBtn">クリップボードにコピー（選択形式）</button>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const csvInput = document.getElementById('csvInput');
    const csvOutput = document.getElementById('csvOutput');
    const transposeBtn = document.getElementById('transposeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');

    // ファイル読み込み（BOM対応）
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        let text = e.target.result;

        // BOM除去
        if (text.charCodeAt(0) === 0xFEFF) {
          text = text.slice(1);
        }

        csvInput.value = text;
      };
      reader.readAsText(file, 'utf-8');
    });

    // 選択された区切り文字を取得
    function getSelectedDelimiter() {
      const format = document.querySelector('input[name="format"]:checked').value;
      return format === 'tsv' ? '\t' : ',';
    }

    // 転置ボタン
    transposeBtn.addEventListener('click', () => {
      const inputText = csvInput.value.trim();
      if (!inputText) {
        alert('CSV/TSVを入力してください');
        return;
      }

      // ダブルクォート検出（未サポート）
      if (inputText.includes('"')) {
        alert('ダブルクォートを含むCSVは未サポートです');
        return;
      }

      const delimiter = detectDelimiter(inputText);
      const transposed = transposeCsv(inputText, delimiter);

      // 出力は選択された形式で
      const outputDelimiter = getSelectedDelimiter();
      const converted = convertDelimiter(transposed, delimiter, outputDelimiter);

      csvOutput.value = converted;
    });

    // 入力の区切り文字を自動判定（TSV優先）
    function detectDelimiter(text) {
      if (text.includes('\t')) return '\t';
      return ',';
    }

    // 転置処理
    function transposeCsv(text, delimiter) {
      const rows = text.split(/\r?\n/).map(line => line.split(delimiter));
      const maxCols = Math.max(...rows.map(r => r.length));

      const normalized = rows.map(r => {
        const copy = r.slice();
        while (copy.length < maxCols) copy.push('');
        return copy;
      });

      const transposed = [];
      for (let c = 0; c < maxCols; c++) {
        const newRow = [];
        for (let r = 0; r < normalized.length; r++) {
          newRow.push(normalized[r][c]);
        }
        transposed.push(newRow);
      }

      return transposed;
    }

    // 区切り文字変換
    function convertDelimiter(rows, fromDelim, toDelim) {
      return rows.map(row => row.join(toDelim)).join('\r\n');
    }

    // ダウンロード（常に CSV）
    downloadBtn.addEventListener('click', () => {
      const text = csvOutput.value;
      if (!text) {
        alert('転置結果がありません');
        return;
      }

      // CSVに強制変換
      const csvText = convertDelimiter(
        text.split(/\r?\n/).map(line => line.split(getSelectedDelimiter())),
        getSelectedDelimiter(),
        ','
      );

      const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'transposed.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // クリップボードコピー（選択形式）
    copyBtn.addEventListener('click', async () => {
      const text = csvOutput.value;
      if (!text) {
        alert('転置結果がありません');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert('クリップボードにコピーしました');
      } catch (e) {
        alert('コピーに失敗しました');
      }
    });
  </script>
</body>
</html>
